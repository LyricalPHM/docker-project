name: CD Docker VPS

on:
  push:
    branches:
      - main

env:
  PROJECT_NAME: cd_docker_project
  IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/cd_docker_project

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/vps_cd_key
          chmod 600 ~/.ssh/vps_cd_key
          ssh-keyscan -p 22 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Pack deployment files
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            -czf /tmp/cd_docker_project.tar.gz \
            app.py \
            requirements.txt \
            Dockerfile \
            docker-compose.yml \
            docker-compose.override.yml \
            prometheus.yml \
            k8s

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/vps_cd_key \
            /tmp/cd_docker_project.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/cd_docker_project.tar.gz

      - name: Deploy on VPS with Docker Compose and Kubernetes
        run: |
          ssh -i ~/.ssh/vps_cd_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << DEPLOY
              set -e

              APP_DIR="\$HOME/cd_docker_project"
              mkdir -p "\$APP_DIR"

              tar -xzf /tmp/cd_docker_project.tar.gz -C "\$APP_DIR"

              cd "\$APP_DIR"

              echo "APP_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}" > .env

              echo "=== Docker Compose deploy ==="
              docker compose -f docker-compose.yml pull
              docker compose -f docker-compose.yml up -d --remove-orphans
              docker ps

              echo "=== Kubernetes deploy ==="
              kubectl apply -f k8s/
              kubectl -n cd-lab set image deployment/cd-docker-web web=${{ env.IMAGE_NAME }}:${{ github.sha }}
              kubectl -n cd-lab rollout status deployment/cd-docker-web --timeout=180s

              echo "=== Kubernetes status ==="
              kubectl -n cd-lab get pods
              kubectl -n cd-lab get svc
              kubectl -n cd-lab get hpa
          DEPLOY

      - name: Check Docker Compose application
        run: |
          curl -f http://${{ secrets.SERVER_HOST }}:8080

      - name: Check Kubernetes application
        run: |
          curl -f http://${{ secrets.SERVER_HOST }}:30080
