apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cd-docker-web-hpa
  namespace: cd-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cd-docker-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
